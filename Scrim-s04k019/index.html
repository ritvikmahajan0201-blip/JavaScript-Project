<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">
                
    </head>
    <body>
        <div class="container">
            <div>
                <h3 id = "homestr">HOME</h3>
                <div class="container-home"><p id = 'score-home'>0</p></div>
            </div>
            <div>
                <h3 id = "gueststr">AWAY</h3>
                <div class="container-guest"><p id = 'score-guest'>0</p></div>
            </div>
            <div class = "container-btn-home"><button id = "add1-btn-home" onclick="add1guest()">+1</button>
                                              <button id = "add2-btn-home" onclick="add2guest()">+2</button>
                                              <button id = "add3-btn-home" onclick="add3guest()">+3</button>
            </div>
            <div class = "container-btn-guest"><button id = "add1-btn-guest" onclick="add1home()">+1</button>
                                               <button id = "add2-btn-guest" onclick="add2home()">+2</button>
                                               <button id = "add3-btn-guest" onclick="add3home()">+3</button>
            <button id = "reset-btn" onclick="resetbtn()">New Game</button>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
